x-langfuse-shared-env: &langfuse-shared-env
  NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3000}
  DATABASE_URL: ${LANGFUSE_DATABASE_URL:-postgresql://postgres:postgres@langfuse-postgres:5432/postgres}
  SALT: ${LANGFUSE_SALT:-replace-with-a-long-random-salt}
  ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-replace-with-a-32-char-encryption-key}
  TELEMETRY_ENABLED: ${LANGFUSE_TELEMETRY_ENABLED:-false}
  CLICKHOUSE_MIGRATION_URL: ${LANGFUSE_CLICKHOUSE_MIGRATION_URL:-clickhouse://langfuse-clickhouse:9000}
  CLICKHOUSE_URL: ${LANGFUSE_CLICKHOUSE_URL:-http://langfuse-clickhouse:8123}
  CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-clickhouse}
  CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse}
  CLICKHOUSE_CLUSTER_ENABLED: "false"
  REDIS_HOST: langfuse-redis
  REDIS_PORT: "6379"
  REDIS_AUTH: ${LANGFUSE_REDIS_AUTH:-langfuse-redis-secret}
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse}
  LANGFUSE_S3_EVENT_UPLOAD_REGION: ${LANGFUSE_S3_REGION:-auto}
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_ACCESS_KEY:-minio}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_S3_SECRET_KEY:-minio123456}
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: ${LANGFUSE_S3_ENDPOINT:-http://langfuse-minio:9000}
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: dualmemorykg-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_LOCAL_PASSWORD:-dualmemorykg123}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://localhost:7687 -u neo4j -p $${NEO4J_LOCAL_PASSWORD:-dualmemorykg123} 'RETURN 1;' || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  langfuse-postgres:
    profiles: ["langfuse"]
    image: postgres:16
    container_name: dualmemorykg-langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LANGFUSE_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${LANGFUSE_POSTGRES_DB:-postgres}
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10

  langfuse-clickhouse:
    profiles: ["langfuse"]
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: dualmemorykg-langfuse-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${LANGFUSE_CLICKHOUSE_DB:-default}
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse}
    ports:
      - "127.0.0.1:8123:8123"
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  langfuse-redis:
    profiles: ["langfuse"]
    image: redis:7-alpine
    container_name: dualmemorykg-langfuse-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--requirepass",
        "${LANGFUSE_REDIS_AUTH:-langfuse-redis-secret}",
      ]
    volumes:
      - langfuse_redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a $${LANGFUSE_REDIS_AUTH:-langfuse-redis-secret} ping | grep -q PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  langfuse-minio:
    profiles: ["langfuse"]
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: dualmemorykg-langfuse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_S3_SECRET_KEY:-minio123456}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  langfuse-minio-init:
    profiles: ["langfuse"]
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    container_name: dualmemorykg-langfuse-minio-init
    depends_on:
      langfuse-minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set lf http://langfuse-minio:9000 ${LANGFUSE_S3_ACCESS_KEY:-minio} ${LANGFUSE_S3_SECRET_KEY:-minio123456}
        && mc mb --ignore-existing lf/${LANGFUSE_S3_BUCKET:-langfuse}
        && mc anonymous set private lf/${LANGFUSE_S3_BUCKET:-langfuse}

  langfuse-web:
    profiles: ["langfuse"]
    image: langfuse/langfuse:3
    container_name: dualmemorykg-langfuse-web
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-minio-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      <<: *langfuse-shared-env
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-replace-with-a-long-random-secret}
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-local}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-DualMemoryKG Local}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-paper1}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-DualMemoryKG}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-pk-lf-local-public-key}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-sk-lf-local-secret-key}

  langfuse-worker:
    profiles: ["langfuse"]
    image: langfuse/langfuse-worker:3
    container_name: dualmemorykg-langfuse-worker
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-minio-init:
        condition: service_completed_successfully
    environment:
      <<: *langfuse-shared-env

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_redis_data:
  langfuse_minio_data:
